<html>
  <head>
    <title>SkyClickGames</title>
    <link rel="stylesheet" href="SCG.css">
  </head>
  <body>
    <div class="fakebg">
      <img src="bg.png" class="bg">
      <div class="TitleGame">
        <h1>SkyClickGames</h1>
        <h3>By:Indra</h3>
      </div>
      <h5 class="notif" id="notif">Not enough money!</h5>
      <div class="blank_screen" id="blank_screen">
        
      </div>
      <div class="Score">
        <span class="realscore" id="realscore">0</span>
      </div>
      <div class="btn">
        <button id="clickvar" class="clickvar"></button>
      </div>
      <div class="button_img">
        <img src="button_click.png" class="button_click" id="button_click">
        <img src="button_un_click.png" class="button_un_click" id="button_un_click">
      </div>
      <div class="perclick_ui">
        <span id="perclick_count" class="perclick">0</span>
      </div>
      <div class="market_area">
      <div class="market_ui_button_img">
        <img src="market_button.png" class="market_button_png" id="market_button_png">
        <img src="market_button_click.png" class="market_button_click_png" id="market_button_click_png">
      </div>
      <div class="market_ui_menu" id="market_ui_menu">
        <img src="market_bg.png" class="market_bg" id="market_bg">
        <div class="box_menu_market">
          <div class="market_slot">
            <div class="slot_bg">
              <img src="market_slot.png" class="slot">
              <img src="icon_slot_1.png" class="icon_slot1">
            </div>
            <span id="slot1" class="slot_price">0</span>
             <button id="slot1_buy" class="slot_buy">BUY</button>
            <h4 class="slot_name">Click Upgrade</h4>
          </div>
        </div>
      </div>
      <div class="market_ui_button">
        <button id="button_market" class="button_market"></button>
      </div>
      </div>
      <div class="reset_ui">
        <button id="reset_btn" class="reset_btn">reset</button>
      </div>
    </div>
    <script src="SCG.js"></script>
  </body>
</html>
